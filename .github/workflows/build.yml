name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install deps
        run: |
          pip install -e ".[gui]"
          pip install pyinstaller
          
      - name: Build
        run: |
          pyinstaller --onedir --windowed --name VideoCaptioner --add-data "resource;resource" --hidden-import=PyQt5 --hidden-import=PyQt5.QtCore --hidden-import=PyQt5.QtGui --hidden-import=PyQt5.QtWidgets --collect-all PyQt5 --collect-all PyQt-Fluent-Widgets videocaptioner/ui/main.py
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VideoCaptioner
          path: dist/VideoCaptioner/
