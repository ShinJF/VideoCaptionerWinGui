name: Build Windows GUI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: false
        default: ''

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pip install -e ".[gui]"
          
      - name: Install PyInstaller
        run: |
          pip install pyinstaller
          
      - name: Build Windows executable
        run: |
          pyinstaller --onedir --windowed --name VideoCaptioner --add-data "resource;resource" --hidden-import=PyQt5 --hidden-import=PyQt5.QtCore --hidden-import=PyQt5.QtGui --hidden-import=PyQt5.QtWidgets --collect-all PyQt5 --collect-all PyQt-Fluent-Widgets videocaptioner/ui/main.py
          
      - name: Create archive
        run: |
          Compress-Archive -Path "dist/VideoCaptioner/*" -DestinationPath "VideoCaptioner-windows.zip"
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoCaptioner-windows
          path: VideoCaptioner-windows.zip
